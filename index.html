<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBKtrading Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; padding: 4px; font-family: monospace; border-bottom: 1px solid #222; }
        .buy { color: #0f0; } .sell { color: #f00; }
        canvas { width: 100%; height: 250px; background: #0a0a0a; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#f59e0b">منصة MBKtrading</h2>
    <input type="range" id="sma" min="5" max="50" value="20">
    <input type="range" id="ema" min="5" max="50" value="20">
    <canvas id="chart"></canvas>
</div>

<div class="box">
    <h2 style="color:#f59e0b">سجل الأوامر (Order Book)</h2>
    <div id="ob-container"></div>
</div>

<script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    let history = { price: [], sma: [], ema: [] };
    let currentPrice = 100;
    let emaVal = 100;

    function drawLine(arr, color) {
        ctx.strokeStyle = color;
        ctx.beginPath();
        arr.forEach((val, i) => {
            let x = i * (canvas.width / 50);
            let y = 125 - (val - 100) * 10;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function update() {
        currentPrice += (Math.random()-0.5)*2;
        const sP = parseInt(document.getElementById('sma').value);
        const eP = parseInt(document.getElementById('ema').value);

        history.price.push(currentPrice);
        if (history.price.length > 50) history.price.shift();

        // حساب المسارات الحقيقية
        let sma = history.price.slice(-sP).reduce((a,b) => a+b, 0) / sP;
        emaVal = (currentPrice * (2/(eP+1))) + (emaVal * (1 - (2/(eP+1))));
        
        history.sma.push(sma); history.ema.push(emaVal);
        if (history.sma.length > 50) { history.sma.shift(); history.ema.shift(); }

        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        // رسم مناطق "ضغط الأوامر" (خلفية)
        ctx.fillStyle = currentPrice > 100 ? 'rgba(0,255,0,0.05)' : 'rgba(255,0,0,0.05)';
        ctx.fillRect(0,0, canvas.width, canvas.height);

        drawLine(history.price, '#fff');
        drawLine(history.sma, '#f00');
        drawLine(history.ema, '#0f0');

        // تحديث الأوامر (تفاعلي)
        document.getElementById('ob-container').innerHTML = 
            `<div class="row sell"><span>${(currentPrice+0.3).toFixed(2)}</span> <span>${Math.floor(currentPrice*2)}</span></div>
             <div class="row" style="background:#222; font-weight:bold">السعر الحالي: ${currentPrice.toFixed(2)}</div>
             <div class="row buy"><span>${(currentPrice-0.3).toFixed(2)}</span> <span>${Math.floor(currentPrice*1.5)}</span></div>`;

        setTimeout(update, 200);
    }
    update();
</script>
</body>
</html>
