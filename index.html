<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBKtrading Live</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; padding: 3px; font-family: monospace; }
        .buy { color: #0f0; } .sell { color: #f00; }
        input { width: 100%; accent-color: #f59e0b; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#f59e0b">منصة MBKtrading</h2>
    <label>SMA Period: <span id="sval">20</span></label><input type="range" id="sma" min="5" max="50" value="20">
    <label>EMA Period: <span id="eval">20</span></label><input type="range" id="ema" min="5" max="50" value="20">
    <canvas id="chart" height="200" style="width:100%; margin-top:10px;"></canvas>
</div>

<div class="box">
    <h2 style="color:#f59e0b">سجل الأوامر (Order Book)</h2>
    <div id="ob-container"></div>
</div>

<script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    let prices = Array(50).fill(100);

    // تحديث ديناميكي للسعر والرسم
    function update() {
        // تحريك السعر
        prices.push(prices[prices.length-1] + (Math.random()-0.5)*2);
        prices.shift();
        
        // رسم الشارت
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = '#f59e0b';
        ctx.beginPath();
        prices.forEach((p, i) => ctx.lineTo(i*(canvas.width/50), 200 - (p-90)*10));
        ctx.stroke();

        // تحديث الأوامر ديناميكياً
        const ob = document.getElementById('ob-container');
        let html = '';
        for(let i=0; i<5; i++) html += `<div class="row sell"><span>${(105+i).toFixed(2)}</span> <span>${Math.floor(Math.random()*100)}</span></div>`;
        html += `<div class="row" style="background:#222">السعر الحالي: ${prices[49].toFixed(2)}</div>`;
        for(let i=0; i<5; i++) html += `<div class="row buy"><span>${(104-i).toFixed(2)}</span> <span>${Math.floor(Math.random()*100)}</span></div>`;
        ob.innerHTML = html;
        
        requestAnimationFrame(update);
    }

    // ربط الأشرطة
    document.getElementById('sma').oninput = (e) => document.getElementById('sval').innerText = e.target.value;
    document.getElementById('ema').oninput = (e) => document.getElementById('eval').innerText = e.target.value;

    update();
</script>
</body>
</html>
