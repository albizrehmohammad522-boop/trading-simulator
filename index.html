<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBKtrading Professional</title>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: 1fr 250px; gap: 10px; height: 95vh; }
        .panel { background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px; position: relative; }
        canvas { width: 100%; height: 80%; }
        .book { font-family: monospace; font-size: 13px; }
        .row { display: flex; justify-content: space-between; padding: 2px 0; }
        .buy { color: #22c55e; } .sell { color: #ef4444; }
        h2 { color: #f59e0b; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="panel">
        <h2>منصة MBKtrading - تحليل السيولة والامتصاص</h2>
        <canvas id="chart"></canvas>
    </div>
    <div class="panel book">
        <h2>سجل الأوامر (Order Book)</h2>
        <div id="ob"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    let price = 100, history = [], profile = {};

    function update() {
        price += (Math.random()-0.5) * 1.5;
        let roundedPrice = Math.round(price);
        
        // تحديث بروفايل الحجم (السيولة)
        profile[roundedPrice] = (profile[roundedPrice] || 0) + 1;
        history.push({p: price, v: profile[roundedPrice]});
        if(history.length > 50) history.shift();

        ctx.clearRect(0,0, canvas.width, canvas.height);

        // رسم مناطق السيولة (الامتصاص)
        Object.keys(profile).forEach(p => {
            let opacity = Math.min(profile[p] / 20, 0.5);
            ctx.fillStyle = `rgba(245, 158, 11, ${opacity})`;
            ctx.fillRect(0, canvas.height - (p - 80)*10, 50, 10);
        });

        // رسم حركة السعر
        ctx.strokeStyle = '#fff';
        ctx.beginPath();
        history.forEach((d, i) => ctx.lineTo(i*(canvas.width/50), canvas.height - (d.p - 80)*10));
        ctx.stroke();

        // تحديث الأوامر
        let obHtml = '';
        for(let i=2; i>0; i--) obHtml += `<div class="row sell"><span>${(price+i).toFixed(2)}</span> <span>${Math.floor(Math.random()*100)}</span></div>`;
        obHtml += `<div class="row" style="background:#222">السعر: ${price.toFixed(2)}</div>`;
        for(let i=1; i<=2; i++) obHtml += `<div class="row buy"><span>${(price-i).toFixed(2)}</span> <span>${Math.floor(Math.random()*100)}</span></div>`;
        document.getElementById('ob').innerHTML = obHtml;

        setTimeout(update, 200);
    }
    update();
</script>
</body>
</html>
