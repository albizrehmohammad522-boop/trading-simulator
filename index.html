<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBKtrading - السيولة والمتوسطات</title>
    <style>
        body { background: #0b0e14; color: #d1d4dc; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: #151924; border: 1px solid #2a2e39; border-radius: 6px; padding: 15px; }
        h2 { color: #eab308; font-size: 16px; margin: 0 0 15px 0; border-bottom: 1px solid #2a2e39; padding-bottom: 8px; text-align: right; }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; justify-content: flex-end; }
        .control-group { display: flex; flex-direction: column; gap: 5px; min-width: 120px; align-items: flex-end; }
        input[type=range] { width: 100%; accent-color: #eab308; }
        .val-badge { background: #2a2e39; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #f59e0b; }
        .chart-container { width: 100%; height: 350px; background: #0b0e14; border: 1px solid #2a2e39; border-radius: 4px; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        .legend { display: flex; gap: 15px; font-size: 11px; margin-top: 10px; justify-content: center; }
        .l-sma { color: #3b82f6; } .l-ema { color: #f59e0b; } .l-wma { color: #a855f7; }
        .current-price { text-align: center; font-weight: bold; padding: 8px; background: #2a2e39; color: #fff; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>شارت MBKtrading - السيولة والمتوسطات</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>SMA Period: <span id="v-sma" class="val-badge">20</span></label>
            <input type="range" id="sma" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label>EMA Period: <span id="v-ema" class="val-badge">20</span></label>
            <input type="range" id="ema" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label>WMA Period: <span id="v-wma" class="val-badge">20</span></label>
            <input type="range" id="wma" min="5" max="50" value="20">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>
    
    <div class="legend">
        <span class="l-sma">■ SMA (بسيط)</span>
        <span class="l-ema">■ EMA (أسي)</span>
        <span class="l-wma">■ WMA (مرجح)</span>
    </div>
</div>

<div class="panel">
    <h2>سجل الأوامر (Order Book & Absorption)</h2>
    <div class="current-price" id="current-price">15000.0</div>
</div>

<script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let currentPrice = 15000;
    let history = Array(60).fill(100);
    let volumeProfile = {}; 
    let patternTick = 0; // مؤشر للنمط

    // ربط المدخلات
    ['sma', 'ema', 'wma'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            document.getElementById('v-'+id).innerText = e.target.value;
        });
    });

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        let minP = Math.min(...history) - 10;
        let maxP = Math.max(...history) + 10;
        let range = maxP - minP;
        let getY = p => canvas.height - ((p - minP) / range) * canvas.height;
        
        // 1. رسم خريطة السيولة (Heatmap - Absorption) في الخلفية
        let maxVol = Math.max(...Object.values(volumeProfile).map(v => v.total).concat([1]));
        Object.keys(volumeProfile).forEach(pStr => {
            let p = parseFloat(pStr);
            if(p < minP || p > maxP) return;
            
            let data = volumeProfile[pStr];
            let netVol = data.buy - data.sell; // صافي الحجم (شراء - بيع)
            
            // اختيار اللون بناءً على صافي الحجم
            let baseColor = netVol > 0 ? 'rgba(34, 197, 94' : 'rgba(239, 68, 68'; 
            let intensity = Math.min((data.total / maxVol) * 0.7 + 0.1, 0.8);
            
            ctx.fillStyle = `${baseColor}, ${intensity})`;
            ctx.fillRect(0, getY(p) - 2, canvas.width, 4); // ممتد لآخر الشارت
        });

        // 2. رسم السعر (خط turquoise)
        ctx.strokeStyle = '#00e6e6';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        history.forEach((p, i) => {
            let x = i * (canvas.width / 59);
            if(i === 0) ctx.moveTo(x, getY(p));
            else ctx.lineTo(x, getY(p));
        });
        ctx.stroke();

        // 3. محاكاة امتصاص الأوامر وتغيير الاتجاه بذيل
        patternTick++;
        let tickVol = Math.floor(Math.random() * 5 + 1);
        let move = (Math.random() - 0.5) * 4;

        if (patternTick > 40 && patternTick < 50) {
            // نمط: ضغط بيع كثيف -> تكوين ذيل علوي -> ارتداد
            move = 10 + (Math.random()*10); // اندفاع للأعلى
            tickVol = 50; // حجم هائل (امتصاص)
            ctx.fillStyle = 'rgba(239, 68, 68, 0.2)'; // تضليل منطقة ضغط البيع
            ctx.fillRect(0,getY(currentPrice+20), canvas.width, 40);
        } else if (patternTick === 50) {
            move = -30; // ارتداد حاد للأسفل بعد تكوين الذيل
            tickVol = 10;
        } else if (patternTick > 70) {
            patternTick = 0; // إعادة النمط
        }

        currentPrice += move;
        history.push(currentPrice);
        history.shift();

        // تحديث خريطة السيولة كل 5 نقاط
        let level = Math.round(currentPrice / 5) * 5; 
        if (!volumeProfile[level]) volumeProfile[level] = {total: 0, buy: 0, sell: 0};
        volumeProfile[level].total += tickVol;
        if (move > 0) volumeProfile[level].buy += tickVol;
        else volumeProfile[level].sell += tickVol;

        document.getElementById('current-price').innerText = currentPrice.toFixed(1);

        setTimeout(draw, 150); // سرعة حركة السوق
    }

    // تهيئة سيولة مبدئية
    for(let i=0; i<30; i++) {
        let p = 15000 + (Math.random()-0.5)*50;
        let level = Math.round(p/5)*5;
        if (!volumeProfile[level]) volumeProfile[level] = {total: 0, buy: 0, sell: 0};
        volumeProfile[level].total = Math.random()*50;
        if (Math.random()>0.5) volumeProfile[level].buy = volumeProfile[level].total;
        else volumeProfile[level].sell = volumeProfile[level].total;
    }
    
    draw();
</script>
</body>
</html>
