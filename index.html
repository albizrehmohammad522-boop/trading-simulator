<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي المتوسطات المتحركة والتداول</title>
    <!-- تضمين مكتبات الرسم البياني والخطوط -->
    <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background-color: #1e293b;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { text-align: center; color: #38bdf8; margin-top: 0; }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1xl));
            gap: 16px;
            margin-bottom: 24px;
            background-color: #0f172a;
            padding: 16px;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label { margin-bottom: 6px; font-size: 14px; color: #94a3b8; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }
        .btn {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0369a1; }
        #chart {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 12px;
            min-height: 450px;
        }
        .legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 12px;
            font-size: 14px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 4px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>محاكي المتوسطات المتحركة (SMA, EMA, WMA) والحجم</h1>
    
    <div class="controls">
        <div class="control-group">
            <label id="sma-label">فترة SMA: 20</label>
            <input type="range" id="sma-period" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label id="ema-label">فترة EMA: 20</label>
            <input type="range" id="ema-period" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label id="wma-label">فترة WMA: 20</label>
            <input type="range" id="wma-period" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label id="vol-label">درجة تقلب السعر</label>
            <input type="range" id="volatility" min="1" max="10" value="5">
        </div>
        <div class="toggle-group">
            <input type="checkbox" id="show-volume" checked>
            <label for="show-volume">عرض حجم التداول (Volume)</label>
        </div>
        <button class="btn" id="new-data">تحديث البيانات السعرية</button>
    </div>

    <div id="chart"></div>
    
    <div class="legend">
        <div class="legend-item"><span class="dot" style="background: #e11d48;"></span> SMA</div>
        <div class="legend-item"><span class="dot" style="background: #22c55e;"></span> EMA</div>
        <div class="legend-item"><span class="dot" style="background: #eab308;"></span> WMA</div>
    </div>
</div>

<script>
    // توليد بيانات وهمية للشموع اليابانية والحجم
    function generateData(count, volMultiplier) {
        let data = [];
        let price = 100;
        for (let i = 0; i < count; i++) {
            let change = (Math.random() - 0.48) * volMultiplier;
            let open = price;
            let close = price + change;
            let high = Math.max(open, close) + Math.random() * (volMultiplier * 0.5);
            let low = Math.min(open, close) - Math.random() * (volMultiplier * 0.5);
            let volume = Math.floor(Math.random() * 500) + (Math.abs(change) * 100);
            
            data.push({ time: i, open, close, high, low, volume });
            price = close;
        }
        return data;
    }

    // الحسابات الرياضية للمؤشرات
    function calcSMA(data, period) {
        return data.map((d, i) => {
            if (i < period - 1) return { time: d.time, value: null };
            let sum = 0;
            for (let j = 0; j < period; j++) sum += data[i - j].close;
            return { time: d.time, value: sum / period };
        }).filter(d => d.value !== null);
    }

    function calcEMA(data, period) {
        let k = 2 / (period + 1);
        let ema = [];
        let prevEma = data[0].close;
        for (let i = 0; i < data.length; i++) {
            if (i < period - 1) {
                ema.push({ time: data[i].time, value: null });
                if (i === period - 2) {
                    let sum = 0;
                    for(let j=0; j<period; j++) sum += data[j].close;
                    prevEma = sum / period;
                }
            } else {
                let curEma = data[i].close * k + prevEma * (1 - k);
                ema.push({ time: data[i].time, value: curEma });
                prevEma = curEma;
            }
        }
        return ema.filter(d => d.value !== null);
    }

    function calcWMA(data, period) {
        let weightSum = (period * (period + 1)) / 2;
        return data.map((d, i) => {
            if (i < period - 1) return { time: d.time, value: null };
            let sum = 0;
            for (let j = 0; j < period; j++) {
                sum += data[i - j].close * (period - j);
            }
            return { time: d.time, value: sum / weightSum };
        }).filter(d => d.value !== null);
    }

    let marketData = generateData(80, 5);

    function renderChart() {
        const smaP = +document.getElementById('sma-period').value;
        const emaP = +document.getElementById('ema-period').value;
        const wmaP = +document.getElementById('wma-period').value;
        const showVol = document.getElementById('show-volume').checked;

        document.getElementById('sma-label').innerText = `فترة SMA: ${smaP}`;
        document.getElementById('ema-label').innerText = `فترة EMA: ${emaP}`;
        document.getElementById('wma-label').innerText = `فترة WMA: ${wmaP}`;

        const smaData = calcSMA(marketData, smaP);
        const emaData = calcEMA(marketData, emaP);
        const wmaData = calcWMA(marketData, wmaP);

        // إنشاء طبقات الرسم البياني باستخدام Observable Plot
        const marks = [
            Plot.ruleX(marketData, {x: "time", y1: "low", y2: "high", stroke: d => d.close > d.open ? "#22c55e" : "#ef4444"}),
            Plot.ruleX(marketData, {x: "time", y1: "open", y2: "close", stroke: d => d.close > d.open ? "#22c55e" : "#ef4444", strokeWidth: 6}),
            Plot.lineY(smaData, {x: "time", y: "value", stroke: "#e11d48", strokeWidth: 2}),
            Plot.lineY(emaData, {x: "time", y: "value", stroke: "#22c55e", strokeWidth: 2}),
            Plot.lineY(wmaData, {x: "time", y: "value", stroke: "#eab308", strokeWidth: 2})
        ];

        if (showVol) {
            // إضافة حجم التداول في أسفل الرسم البياني بنسبة شفافة لكي لا يغطي الشموع
            marks.push(Plot.rectY(marketData, {x: "time", y2: "volume", y1: 0, fill: "#334155", opacity: 0.3}));
        }

        const chart = Plot.plot({
            width: 850,
            height: 450,
            y: { grid: true, inset: 10, ticks: 8 },
            x: { axis: null },
            marks: marks
        });

        const container = document.getElementById('chart');
        container.innerHTML = "";
        container.appendChild(chart);
    }

    // ربط عناصر التحكم بالأحداث لتحديث الرسم تلقائياً
    document.querySelectorAll('input').forEach(input => input.addEventListener('input', renderChart));
    document.getElementById('new-data').addEventListener('click', () => {
        const vol = +document.getElementById('volatility').value;
        marketData = generateData(80, vol);
        renderChart();
    });

    renderChart();
</script>

</body>
</html>
