<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBKtrading Professional</title>
    <style>
        body { 
            background: #000000; 
            color: #d1d4dc; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 15px 10px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel { 
            background: #131722; 
            border: 1px solid #2a2e39; 
            border-radius: 8px; 
            padding: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .header-title {
            color: #f59e0b;
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 15px 0;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 10px;
        }
        .chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }
        canvas { 
            width: 100%; 
            height: 100%; 
            display: block;
        }
        .book { font-family: 'Courier New', Courier, monospace; font-size: 14px; }
        .row { display: flex; justify-content: space-between; padding: 6px 5px; border-bottom: 1px solid #1e222d; }
        .buy { color: #089981; } 
        .sell { color: #f23645; }
        .current-price { 
            background: #2a2e39; 
            color: #ffffff; 
            font-weight: bold; 
            text-align: center; 
            padding: 8px; 
            border-radius: 4px; 
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="panel">
    <div class="header-title">شارت السيولة والامتصاص - MBKtrading</div>
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>
</div>

<div class="panel book">
    <div class="header-title">سجل الأوامر (Order Book)</div>
    <div id="ob"></div>
</div>

<script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    
    // ضبط حجم الشارت ليتوافق مع شاشة الهاتف
    function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let price = 100;
    let history = Array(60).fill(100);
    let profile = {};

    function update() {
        // تحديث حركة السعر
        price += (Math.random() - 0.5) * 1.5;
        let roundedPrice = Math.round(price * 2) / 2; // التقريب لأقرب 0.5 لتكوين مناطق الامتصاص
        
        profile[roundedPrice] = (profile[roundedPrice] || 0) + 1;
        
        history.push(price);
        if(history.length > 60) history.shift();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // حساب أبعاد الشارت لعمل Auto-Scale
        const minPrice = Math.min(...history) - 2;
        const maxPrice = Math.max(...history) + 2;
        const priceRange = maxPrice - minPrice;
        const getY = (p) => canvas.height - ((p - minPrice) / priceRange) * canvas.height;

        // رسم مناطق السيولة (Fixed Volume Profile)
        Object.keys(profile).forEach(pStr => {
            let p = parseFloat(pStr);
            if (p < minPrice || p > maxPrice) return; 
            let intensity = Math.min(profile[pStr] / 30, 0.6); // كلما زاد الحجم زاد وضوح اللون
            ctx.fillStyle = `rgba(245, 158, 11, ${intensity})`;
            let y = getY(p);
            ctx.fillRect(0, y - 5, 80, 10);
        });

        // رسم خط السعر
        ctx.strokeStyle = '#2962ff';
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        history.forEach((p, i) => {
            let x = i * (canvas.width / 59);
            let y = getY(p);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // رسم خط أفقي للسعر الحالي
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        let currentY = getY(price);
        ctx.beginPath();
        ctx.moveTo(0, currentY);
        ctx.lineTo(canvas.width, currentY);
        ctx.stroke();
        ctx.setLineDash([]); 

        // تحديث دفتر الأوامر
        let obHtml = '';
        for(let i=3; i>0; i--) {
            let ask = price + (i * 0.3);
            obHtml += `<div class="row sell"><span>${ask.toFixed(2)}</span> <span>${Math.floor(Math.random()*80 + 20)}</span></div>`;
        }
        obHtml += `<div class="current-price">السعر الحالي: ${price.toFixed(2)}</div>`;
        for(let i=1; i<=3; i++) {
            let bid = price - (i * 0.3);
            obHtml += `<div class="row buy"><span>${bid.toFixed(2)}</span> <span>${Math.floor(Math.random()*80 + 20)}</span></div>`;
        }
        document.getElementById('ob').innerHTML = obHtml;

        setTimeout(update, 150); 
    }
    
    update();
</script>
</body>
</html>
