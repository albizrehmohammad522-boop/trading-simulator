<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBKtrading - السيولة والمتوسطات</title>
    <style>
        body { background: #0b0e14; color: #d1d4dc; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: #151924; border: 1px solid #2a2e39; border-radius: 6px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { color: #eab308; font-size: 16px; margin: 0 0 15px 0; border-bottom: 1px solid #2a2e39; padding-bottom: 8px; text-align: right; }
        
        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; font-size: 13px; justify-content: space-between; }
        .control-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 90px; align-items: center; }
        input[type=range] { width: 100%; accent-color: #eab308; cursor: pointer; }
        .val-badge { display: inline-block; background: #2a2e39; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        
        .chart-container { width: 100%; height: 380px; position: relative; background: #0b0e14; border: 1px solid #2a2e39; border-radius: 4px; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        
        .ob-container { display: flex; flex-direction: column; gap: 4px; font-family: monospace; font-size: 14px; }
        .ob-row { display: flex; justify-content: space-between; padding: 5px 10px; border-radius: 3px; position: relative; overflow: hidden; }
        .ob-row.sell { color: #f23645; }
        .ob-row.buy { color: #089981; }
        .ob-bg { position: absolute; right: 0; top: 0; bottom: 0; opacity: 0.15; z-index: 0; transition: width 0.2s; }
        .ob-row.sell .ob-bg { background: #f23645; }
        .ob-row.buy .ob-bg { background: #089981; }
        .ob-text { position: relative; z-index: 1; display: flex; justify-content: space-between; width: 100%; }
        .current-price { text-align: center; font-weight: bold; font-size: 16px; padding: 10px; background: #2a2e39; color: #fff; margin: 5px 0; border-radius: 4px; border-right: 4px solid #eab308; }
        
        .legend { display: flex; gap: 15px; font-size: 12px; margin-top: 15px; justify-content: center; font-weight: bold; }
        .l-sma { color: #2962FF; } .l-ema { color: #FF9800; } .l-wma { color: #E91E63; }
    </style>
</head>
<body>

<div class="panel">
    <h2>شارت MBKtrading - السيولة والمتوسطات</h2>
    
    <div class="controls">
        <div class="control-group">
            <label class="l-sma">SMA Period: <span id="v-sma" class="val-badge">20</span></label>
            <input type="range" id="sma" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label class="l-ema">EMA Period: <span id="v-ema" class="val-badge">20</span></label>
            <input type="range" id="ema" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label class="l-wma">WMA Period: <span id="v-wma" class="val-badge">20</span></label>
            <input type="range" id="wma" min="5" max="50" value="20">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>
    
    <div class="legend">
        <span class="l-sma">■ SMA (بسيط)</span>
        <span class="l-ema">■ EMA (أسي)</span>
        <span class="l-wma">■ WMA (مرجح)</span>
    </div>
</div>

<div class="panel">
    <h2>سجل الأوامر (Order Book & Absorption)</h2>
    <div class="ob-container" id="ob"></div>
</div>

<script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let currentPrice = 15000;
    let candles = [];
    let currentCandle = {o: currentPrice, h: currentPrice, l: currentPrice, c: currentPrice};
    let tickCount = 0;
    let patternTick = 0;
    let volumeProfile = {}; 

    // ربط قيم الأشرطة (Sliders)
    ['sma', 'ema', 'wma'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            document.getElementById('v-'+id).innerText = e.target.value;
        });
    });

    // دالة حساب المتوسطات بشكل آمن ومستقل
    function calculateMAs(closes) {
        const pSMA = parseInt(document.getElementById('sma').value) || 20;
        const pEMA = parseInt(document.getElementById('ema').value) || 20;
        const pWMA = parseInt(document.getElementById('wma').value) || 20;
        let sma = [], ema = [], wma = [];
        
        for(let i=0; i<closes.length; i++) {
            // SMA
            if(i >= pSMA - 1) {
                let sum = 0; for(let j=0; j<pSMA; j++) sum += closes[i-j];
                sma.push(sum / pSMA);
            } else sma.push(null);

            // EMA
            if(i === 0) ema.push(closes[i]);
            else { let k = 2 / (pEMA + 1); ema.push(closes[i] * k + ema[i-1] * (1 - k)); }

            // WMA
            if(i >= pWMA - 1) {
                let sum = 0, weightSum = 0;
                for(let j=0; j<pWMA; j++) { let weight = pWMA - j; sum += closes[i-j] * weight; weightSum += weight; }
                wma.push(sum / weightSum);
            } else wma.push(null);
        }
        return {sma, ema, wma};
    }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        let allCandles = [...candles, currentCandle];
        let closes = allCandles.map(c => c.c);
        
        let minP = Math.min(...allCandles.map(c => c.l)) - 20;
        let maxP = Math.max(...allCandles.map(c => c.h)) + 20;
        let range = maxP - minP;
        let getY = p => canvas.height - ((p - minP) / range) * canvas.height;
        
        let candleWidth = canvas.width / 60;
        let startIdx = Math.max(0, allCandles.length - 60);
        let visibleCandles = allCandles.slice(startIdx);

        // 1. رسم الهيت ماب الديناميكي
        let maxVol = Math.max(...Object.values(volumeProfile).map(v => Math.abs(v.buy - v.sell)).concat([1]));
        Object.keys(volumeProfile).forEach(pStr => {
            let p = parseFloat(pStr);
            if(p < minP || p > maxP) return;
            let data = volumeProfile[pStr];
            
            let delta = data.buy - data.sell; // صافي السيولة
            if(Math.abs(delta) < 1) return;
            
            let isBuyDominant = delta > 0;
            let intensity = Math.min((Math.abs(delta) / maxVol) * 0.7 + 0.1, 0.7); // قوة اللون بناءً على الحجم
            
            // أخضر لضغط الشراء، أحمر لضغط البيع
            ctx.fillStyle = isBuyDominant ? `rgba(8, 153, 129, ${intensity})` : `rgba(242, 54, 69, ${intensity})`;
            ctx.fillRect(0, getY(p) - 3, canvas.width, 6); // خط يمتد بعرض الشاشة
        });

        // 2. رسم الشموع اليابانية
        visibleCandles.forEach((c, i) => {
            let x = i * candleWidth + (candleWidth/2);
            let isGreen = c.c >= c.o;
            let color = isGreen ? '#089981' : '#f23645';
            
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 2;
            
            // رسم الذيل
            ctx.beginPath();
            ctx.moveTo(x, getY(c.h));
            ctx.lineTo(x, getY(c.l));
            ctx.stroke();
            
            // رسم الجسم
            let yO = getY(c.o), yC = getY(c.c);
            let bodyHeight = Math.max(Math.abs(yO - yC), 2); // ضمان ظهور الجسم حتى لو الإغلاق يساوي الافتتاح
            ctx.fillRect(x - candleWidth*0.35, Math.min(yO, yC), candleWidth*0.7, bodyHeight);
        });

        // 3. رسم المتوسطات المتحركة (محمية من أخطاء الـ Null)
        let mas = calculateMAs(closes);
        const drawLine = (data, color, width) => {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.setLineDash([]); // ضمان أن الخط متصل
            ctx.beginPath();
            
            let visData = data.slice(startIdx);
            let started = false;
            
            visData.forEach((val, i) => {
                if(val === null || isNaN(val)) return;
                let x = i * candleWidth + (candleWidth/2);
                let y = getY(val);
                if(!started) { ctx.moveTo(x, y); started = true; }
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        };
        
        drawLine(mas.sma, '#2962FF', 2.5); // أزرق سماكة 2.5
        drawLine(mas.ema, '#FF9800', 2.5); // برتقالي
        drawLine(mas.wma, '#E91E63', 2.5); // وردي

        // 4. تحديث سجل الأوامر
        let obHtml = '';
        for(let i=4; i>0; i--) {
            let p = currentPrice + (i * 2.5);
            let lvl = Math.round(p/5)*5;
            let vol = Math.floor(Math.random() * 20 + (volumeProfile[lvl]?.sell || 0) % 100 + 10);
            let pct = Math.min((vol / 150) * 100, 100);
            obHtml += `<div class="ob-row sell"><div class="ob-bg" style="width:${pct}%"></div><div class="ob-text"><span>${p.toFixed(1)}</span> <span>${vol}</span></div></div>`;
        }
        obHtml += `<div class="current-price">${currentPrice.toFixed(1)}</div>`;
        for(let i=1; i<=4; i++) {
            let p = currentPrice - (i * 2.5);
            let lvl = Math.round(p/5)*5;
            let vol = Math.floor(Math.random() * 20 + (volumeProfile[lvl]?.buy || 0) % 100 + 10);
            let pct = Math.min((vol / 150) * 100, 100);
            obHtml += `<div class="ob-row buy"><div class="ob-bg" style="width:${pct}%"></div><div class="ob-text"><span>${p.toFixed(1)}</span> <span>${vol}</span></div></div>`;
        }
        document.getElementById('ob').innerHTML = obHtml;
    }

    function simulateTick() {
        patternTick++;
        let move = (Math.random() - 0.5) * 5;
        let tickVol = Math.floor(Math.random() * 15 + 5);
        let isBuy = move > 0;

        // سيناريو ذكي لامتصاص الأوامر وتكوين ذيل واضح للطلاب
        if (patternTick >= 40 && patternTick < 45) {
            move = 10; tickVol = 40; isBuy = true; // صعود قوي
        } else if (patternTick >= 45 && patternTick < 50) {
            move = 0.5; tickVol = 400; isBuy = false; // يصطدم بمقاومة، البائعون يمتصون الشراء بقوة هائلة
        } else if (patternTick === 50) {
            move = -30; tickVol = 150; isBuy = false; // ارتداد عنيف للأسفل يترك ذيلاً طويلاً
        } else if (patternTick >= 90 && patternTick < 95) {
            move = -10; tickVol = 40; isBuy = false; // هبوط قوي
        } else if (patternTick >= 95 && patternTick < 100) {
            move = -0.5; tickVol = 400; isBuy = true; // يصطدم بدعم، المشترون يمتصون البيع
        } else if (patternTick === 100) {
            move = 30; tickVol = 150; isBuy = true; // ارتداد عنيف للأعلى
        } else if (patternTick > 140) {
            patternTick = 0; // إعادة النمط
        }

        // تلاشي الأحجام القديمة لتتغير الألوان فوراً عند دخول سيولة جديدة
        if (patternTick % 3 === 0) {
            Object.keys(volumeProfile).forEach(k => {
                volumeProfile[k].buy *= 0.93;
                volumeProfile[k].sell *= 0.93;
            });
        }

        currentPrice += move;
        currentCandle.c = currentPrice;
        currentCandle.h = Math.max(currentCandle.h, currentPrice);
        currentCandle.l = Math.min(currentCandle.l, currentPrice);

        // تسجيل حجم التداول في الهيت ماب
        let level = Math.round(currentPrice / 5) * 5; 
        if (!volumeProfile[level]) volumeProfile[level] = {buy: 0, sell: 0};
        if (isBuy) volumeProfile[level].buy += tickVol;
        else volumeProfile[level].sell += tickVol;

        tickCount++;
        if(tickCount > 15) { 
            candles.push({...currentCandle});
            if(candles.length > 100) candles.shift();
            currentCandle = {o: currentPrice, h: currentPrice, l: currentPrice, c: currentPrice};
            tickCount = 0;
        }
        
        draw();
        setTimeout(simulateTick, 180); 
    }

    // تهيئة سيولة عشوائية ومسبقة لظهور الشارت بشكل واقعي
    for(let i=0; i<45; i++) {
        let open = currentPrice;
        currentPrice += (Math.random()-0.5)*15;
        candles.push({o: open, h: Math.max(open, currentPrice)+5, l: Math.min(open, currentPrice)-5, c: currentPrice});
        
        let lvl = Math.round(currentPrice/5)*5;
        if (!volumeProfile[lvl]) volumeProfile[lvl] = {buy: 0, sell: 0};
        volumeProfile[lvl][Math.random() > 0.5 ? 'buy' : 'sell'] += Math.random() * 100 + 50;
    }
    
    simulateTick();
</script>
</body>
</html>
