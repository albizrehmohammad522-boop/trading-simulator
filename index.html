<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBKtrading</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .dashboard { display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; width: 100%; box-sizing: border-box; }
        h2 { color: #f59e0b; font-size: 18px; margin: 0 0 10px 0; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        #chart-area { width: 100%; overflow-x: auto; }
        .book-row { display: flex; justify-content: space-between; padding: 4px; font-size: 13px; font-family: monospace; }
        .buy { color: #22c55e; } .sell { color: #ef4444; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel">
        <h2>منصة MBKtrading</h2>
        <div class="controls">
            <label>SMA: <input type="range" id="sma" min="5" max="50" value="20"></label>
            <label>EMA: <input type="range" id="ema" min="5" max="50" value="20"></label>
        </div>
        <div id="chart-area"></div>
    </div>
    
    <div class="panel">
        <h2>سجل الأوامر (Order Book)</h2>
        <div id="order-book"></div>
    </div>
</div>

<script>
    function render() {
        const data = Array.from({length: 40}, (_, i) => ({time: i, price: 100 + Math.random()*10, vol: Math.random()*50}));
        
        const chart = Plot.plot({
            width: 320, height: 200,
            marks: [Plot.line(data, {x: "time", y: "price", stroke: "#f59e0b"})]
        });
        
        const area = document.getElementById("chart-area");
        area.innerHTML = "";
        area.appendChild(chart);

        const ob = document.getElementById("order-book");
        ob.innerHTML = '<div class="book-row sell"><span>110</span> <span>20</span></div><div class="book-row" style="background:#222">السعر: 105</div><div class="book-row buy"><span>100</span> <span>45</span></div>';
    }
    render();
</script>

</body>
</html>
